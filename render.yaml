services:
  # 1. CineWave API Web Service
  - type: web
    name: cinewave-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cinewave-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: cinewave-db
          property: connectionString
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 120
      # User needs to fill these manually in Render Dashboard:
      # - JWT_SECRET_KEY
      # - API_KEY (TMDB)
      # - GEMINI_API_KEY
      # - GROQ_API_KEY

  # 2. CineWave PostgreSQL Database
databases:
  - name: cinewave-db
    databaseName: cinewave_db
    user: cinewave
    plan: free # Change to 'standard' for production if needed
