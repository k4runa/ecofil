# CineWave — Docker Compose
# Two-service stack: FastAPI application + PostgreSQL database.
#
# Usage:
#   docker-compose up -d --build           # Build and start in background
#   docker-compose logs -f cinewave_api    # Stream logs
#   docker-compose down                    # Stop and remove containers
#
# The .env file is loaded automatically for secrets (JWT key, TMDB API key).
# PostgreSQL data is persisted via a named Docker volume.


services:
  cinewave_db:
    image: postgres:16-alpine
    container_name: cinewave_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinewave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cinewave_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cinewave_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinewave} -d ${POSTGRES_DB:-cinewave_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
      
  cinewave_api:
    build: .
    container_name: cinewave_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app                          # Live-reload during development
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cinewave}:${POSTGRES_PASSWORD:-cinewave_secret}@cinewave_db:5432/${POSTGRES_DB:-cinewave_db}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-cinewave}:${POSTGRES_PASSWORD:-cinewave_secret}@cinewave_db:5432/${POSTGRES_DB:-cinewave_db}
    env_file:
      - .env                            # Secrets: JWT_SECRET_KEY, API_KEY, etc.
    depends_on:
      cinewave_db:
        condition: service_healthy

volumes:
  pgdata:
